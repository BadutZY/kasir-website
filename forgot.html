<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password Page</title>
    <link rel="website icon" type="png" href="img/LOGO.png">
    <link rel="stylesheet" href="CSS/forgot.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Selamat Datang</h1>
            <p>Silahkan reset password</p>
        </div>
        <form id="resetForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="resetUsername" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="password-requirements">
                Password must be at least 8 characters long with letters, numbers, and symbols
            </div>
            <div class="form-group">
                <label for="password">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            
            <button type="submit" class="login-button">Reset Password</button>
            <div class="signup-link">
                You have an account? <a href="login.html">Log in</a>
            </div>
        </form>
    </div>

    <script src="JavaScript/forgot.js"></script>
    <script src="Sweet-Alert-2/package/dist/sweetalert2.all.min.js"></script>
</body>
</html>
